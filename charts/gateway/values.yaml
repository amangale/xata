image:
  repository: ghcr.io/xataio/xata/gateway
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 5432
  targetPort: 7654
  httpPort: 443
  httpTargetPort: 8443
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: instance
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-proxy-protocol: "*"

http:
  enabled: true

clustersNamespace: xata-clusters

resources:
  limits:
    cpu: 8000m
    memory: 300Mi
  requests:
    cpu: 4000m
    memory: 300Mi

secret:
  name: gateway-secret
  mountPath: /pki

extraEnv: []

imagePullSecrets: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - gateway
          topologyKey: kubernetes.io/hostname

tolerations:
  - effect: NoSchedule
    key: xata.io/workload
    value: dataplane
  - effect: NoSchedule
    key: kubernetes.io/arch
    operator: Equal
    value: arm64

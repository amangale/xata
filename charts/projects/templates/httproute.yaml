{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    xata.tech/gateway: api
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.parentRef.name }}
      {{- if .Values.httpRoute.parentRef.namespace }}
      namespace: {{ .Values.httpRoute.parentRef.namespace }}
      {{- end }}
  hostnames:
    - {{ .Values.httpRoute.hostname }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .Chart.Name }}
          port: {{ .Values.service.httpPort }}
          weight: 1
      matches:
        {{- range .Values.httpRoute.pathPatterns }}
        - path:
            type: RegularExpression
            value: {{ . | quote }}
        {{- end }}
      timeouts:
        request: 60s
{{- end }}

syntax = "proto3";

package projects.v1;

// ProjectsService service provides methods to manage projects service
service ProjectsService {
  // List regions
  rpc ListRegions(ListRegionsRequest) returns (ListRegionsResponse) {}

  // Create region
  rpc CreateRegion(CreateRegionRequest) returns (CreateRegionResponse) {}

  // List cells
  rpc ListCells(ListCellsRequest) returns (ListCellsResponse) {}

  // Create cell
  rpc CreateCell(CreateCellRequest) returns (CreateCellResponse) {}

  // Validate hierarchy of projects, branches, and organizations
  rpc ValidateHierarchy(ValidateHierarchyRequest) returns (ValidateHierarchyResponse) {}

  // Update organization status hibernates or wakes up all branches under the organization
  rpc UpdateOrganizationStatus(UpdateOrganizationStatusRequest) returns (UpdateOrganizationStatusResponse) {}

  // DeleteProjectsInOrg soft-deletes all projects and branches for an organization
  rpc DeleteProjectsInOrg(DeleteProjectsInOrgRequest) returns (DeleteProjectsInOrgResponse) {}

  // HasActiveProjects returns true if the organization has at least one active project
  rpc HasActiveProjects(HasActiveProjectsRequest) returns (HasActiveProjectsResponse) {}

  // SetOrganizationLimits upserts and/or resets projects-store limit overrides
  // for an organization (empty project_id) or a single project.
  rpc SetOrganizationLimits(SetOrganizationLimitsRequest) returns (SetOrganizationLimitsResponse) {}

  // GetOrganizationLimits returns the stored projects-store limit overrides for
  // an organization (empty project_id) or a single project.
  rpc GetOrganizationLimits(GetOrganizationLimitsRequest) returns (GetOrganizationLimitsResponse) {}
}

// ListRegionsRequest is the request object for ListRegions
message ListRegionsRequest {}

// ListRegionsResponse is the response object for ListRegions
message ListRegionsResponse {
  repeated Region regions = 1;
}

message Region {
  string id = 1;

  bool public_access = 2; // true if the region has public access (over the Internet) to SQL

  optional string organization_id = 3; // if set, the region will be available only for this organization

  bool backups_enabled = 4; // true if backups are enabled for branches created in this region

  string provider = 5; // cloud provider the region runs on (aws, gcp or custom)
}

// CreateRegionRequest is the request object for CreateRegion
message CreateRegionRequest {
  string id = 1;
  bool public_access = 2;
  string hostport = 4; // host:port of the region SQL gateway (ie us-east-1.xata.tech)
  optional string organization_id = 3; // if set, the region will be available only for this organization
  bool backups_enabled = 5; // true if backups should be enabled for branches created in this region
  string provider = 6; // cloud provider the region runs on, must be one of: aws, gcp, custom
}

// CreateRegionResponse is the response object for CreateRegion
message CreateRegionResponse {}

// ListCellsRequest is the request object for ListCells
message ListCellsRequest {}

// ListCellsResponse is the response object for ListCells
message ListCellsResponse {
  repeated Cell cells = 1;
}

// CreateCellResponse is the response object for CreateCell
message CreateCellResponse {}

message Cell {
  string id = 1;
  string region_id = 2;
  string clusters_grpc_url = 3;
  bool is_primary = 4;
}

message CreateCellRequest {
  string id = 1;
  string region_id = 2;
  string clusters_grpc_url = 3;
  bool is_primary = 4;
}

// ValidateHierarchyRequest is the request object for ValidateHierarchy
message ValidateHierarchyRequest {
  repeated string organization_ids = 1;
  repeated string project_ids = 2;
  repeated string branch_ids = 3;
}

// ValidateHierarchyResponse is the response object for ValidateHierarchy
message ValidateHierarchyResponse {
  // If not valid, error is thrown
}

// UpdateOrganizationRequest is the request object for UpdateOrganizationStatus
message UpdateOrganizationStatusRequest {
  string organization_id = 1;
  bool disabled = 2;
}

// UpdateOrganizationResponse is the response object for UpdateOrganizationStatus
message UpdateOrganizationStatusResponse {
  string organization_id = 1;
}

// HasActiveProjectsRequest is the request object for HasActiveProjects
message HasActiveProjectsRequest {
  string organization_id = 1;
}

// HasActiveProjectsResponse is the response object for HasActiveProjects
message HasActiveProjectsResponse {
  bool has_active_projects = 1;
}

// DeleteProjectsInOrgRequest is the request object for DeleteProjectsInOrg
message DeleteProjectsInOrgRequest {
  string organization_id = 1;
}

// DeleteProjectsInOrgResponse is the response object for DeleteProjectsInOrg
message DeleteProjectsInOrgResponse {
  string organization_id = 1;
  int32 projects_deleted = 2;
  int32 branches_deleted = 3;
  repeated string errors = 4;
}

// Limits carries projects-store limit overrides. Every field is optional: on a
// write a present field is upserted and an absent field is left unchanged; on a
// read only fields with a stored override are present. All values are integers
// (max_allowed_instance_type is a vCPU value, not an instance type name).
message Limits {
  optional int64 max_description_length = 1;
  optional int64 max_branches_per_project = 2;
  optional int64 max_instances_per_branch = 3;
  optional int64 min_instances_per_branch = 4;
  optional int64 max_storage_gb_per_branch = 5;
  optional int64 max_allowed_instance_type = 6;
  optional int64 max_branches_per_hour = 7;
  optional int64 max_branches_per_org = 8;
  optional int64 max_projects = 9;
  optional int64 max_projects_per_hour = 10;
}

// SetOrganizationLimitsRequest is the request object for SetOrganizationLimits
message SetOrganizationLimitsRequest {
  string organization_id = 1;
  // project_id scopes the override to a single project; empty applies it at the
  // organization level.
  string project_id = 2;
  // limits holds the overrides to upsert; only present fields are written.
  Limits limits = 3;
  // reset lists limit keys (the same names used in limits, e.g.
  // "max_branches_per_org") whose overrides are deleted so they fall back to the
  // tier default.
  repeated string reset = 4;
}

// SetOrganizationLimitsResponse is the response object for SetOrganizationLimits
message SetOrganizationLimitsResponse {
  // limits holds the stored overrides after the write.
  Limits limits = 1;
}

// GetOrganizationLimitsRequest is the request object for GetOrganizationLimits
message GetOrganizationLimitsRequest {
  string organization_id = 1;
  // project_id scopes the read to a single project (merged over org-level
  // overrides); empty returns the organization-level overrides only.
  string project_id = 2;
}

// GetOrganizationLimitsResponse is the response object for GetOrganizationLimits
message GetOrganizationLimitsResponse {
  // limits holds the stored overrides; only overridden fields are present.
  Limits limits = 1;
}

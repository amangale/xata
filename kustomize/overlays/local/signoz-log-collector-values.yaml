# Standalone OTel Collector DaemonSet for container log collection
# Chart: https://charts.signoz.io / signoz/k8s-infra
#
# The main SigNoz collector can't run filelog because its OpAMP config
# manager replaces custom receivers on connect. This deploys a separate
# otel-collector-contrib DaemonSet that owns the filelog pipeline and
# forwards logs via OTLP to the main collector.

otelCollectorEndpoint: signoz-local-otel-collector.signoz.svc.cluster.local:4317
otelInsecure: true

clusterName: kind

# -- Log collection via filelog receiver (DaemonSet)
presets:
  logsCollection:
    enabled: true
    startAt: end
    includeFilePath: true
    blacklist:
      enabled: true
      signozLogs: true
      namespaces:
        - kube-system

# -- OTel Agent (DaemonSet) — collects logs from /var/log/pods
otelAgent:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  config:
    receivers:
      filelog/k8s:
        operators:
          - id: container-parser
            type: container
          # CNPG / xata services emit JSON logs; non-JSON bodies pass through.
          - type: json_parser
            if: 'body matches "^\\{.*\\}$"'
            parse_from: body
            parse_to: attributes
            on_error: send_quiet
          # Default severity from the top-level "level" field
          # (CNPG instance-manager and xata Go services).
          - type: severity_parser
            if: 'attributes.level != nil'
            parse_from: attributes.level
            overwrite_text: true
          # CNPG PostgreSQL: unwrap the nested `record` envelope.
          # backend_type → top-level attribute (queried by branchLogs);
          # error_severity → otel severity; record.message → body.
          - type: copy
            if: 'attributes.logger == "postgres" and attributes.record != nil and attributes.record.backend_type != nil'
            from: attributes.record.backend_type
            to: attributes.backend_type
          # pgaudit shares postgres backends but is its own audit stream.
          # Force backend_type so the `process=pgaudit` filter matches at
          # query time without depending on read-side derivation.
          - type: add
            if: 'attributes.logger == "pgaudit"'
            field: attributes.backend_type
            value: pgaudit
          - type: severity_parser
            if: 'attributes.logger in ["postgres", "pgaudit"] and attributes.record != nil and attributes.record.error_severity != nil'
            parse_from: attributes.record.error_severity
            overwrite_text: true
            mapping:
              info: [LOG, NOTICE]
              warn: WARNING
              fatal: [FATAL, PANIC, CRITICAL]
              debug: [DEBUG1, DEBUG2, DEBUG3, DEBUG4, DEBUG5]

# -- Disable the cluster-wide Deployment collector (not needed locally)
otelDeployment:
  enabled: false
